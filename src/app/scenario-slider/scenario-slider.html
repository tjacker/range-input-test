<legend class="t5" id="{{ scenarioSliderId }}">
  <span>{{ selectedFearLabel }}</span>
</legend>

<mg-range-input ariaLabelledby="{{ scenarioSliderId }}" name="{{ scenarioSliderId }}" prefix="{{ prefix }}"
  suffix="{{ suffix }}" mgBoundedFormat="{{ mgBoundedFormat }}" mgDisplayFormat="{{ mgDisplayFormat }}"
  [mgNumberFormatConverterOptions]="{
    format: '0',
    maximum: this.maximum,
  }" mgCommonFormsNestedFormControl [min]="minimum" [max]="maximum" [step]="step" [options]="options"
  [dropDebounce]="0" [dragDebounce]="0" [ngModel]="value" (rangeDrop)="onDropHandler($event)"
  (rangeDrag)="onDragHandler()">
  @if (secondaryMarkerOptions) {
  <span class="c-range-input__marker" [style.left.%]="secondaryMarkerOptions.placement" [style.font-size.px]="24">
    <fa-icon [icon]="faLocationPin"></fa-icon>
  </span>
  }
</mg-range-input>

<div class="c-range-input__display-wrapper">
  <div class="c-range-input__value">
    <span>{{value}}</span>
  </div>

  <div class="c-range-input__status">
    <span>{{status}}</span>
  </div>
</div>
